<div class="meta">
  <div><span data-pagefind-meta="date">2024-03-22</span></div>
  <div>
    <span><a href="https://www.xiaoledeng.com/tags/life/">#Life</a></span>

<div class="content">
  <p>人生到处知何似，应似飞鸿踏雪泥。</p>
<p>泥上偶然留指爪，鸿飞那复计东西。</p>
<p>老僧已死成新塔，坏壁无由见旧题。</p>
<p>往日崎岖还记否，路长人困蹇驴嘶。</p>
</div>
